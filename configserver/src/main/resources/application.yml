spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/samnangMYC/application-config

server:
  port: 8888

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/